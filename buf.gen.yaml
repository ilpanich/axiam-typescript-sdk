version: v2
plugins:
  # TypeScript: ts-proto (@grpc/grpc-js compatible stubs).
  #
  # src/gen/ is gitignored (Phase 15 D-01): the stubs are a build product,
  # regenerated by `npm run generate` (the `prebuild` hook) in CI and before
  # every publish, so the npm tarball ships compiled stubs while the git tree
  # stays free of generated code.
  - remote: buf.build/community/stephenh-ts-proto
    out: src/gen
    opt:
      - target=ts
      - outputServices=grpc-js
