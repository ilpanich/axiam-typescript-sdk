name: SDK CI — TypeScript

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    name: Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # buf generate (below) needs the buf CLI.
      - name: Install buf
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff  # v1.4.0
        with:
          setup_only: true

      - name: Install dependencies
        run: npm ci

      # src/gen stays gitignored (Phase 15 D-01); buf generate runs here as the
      # CI-time codegen step (buf.gen.yaml targets src/gen from the local
      # proto/ module with outputServices=grpc-js).
      - name: Generate proto stubs (buf generate)
        run: npm run generate

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --run

      # Docs gate: every export reachable from src/index.ts must carry a
      # TSDoc comment. typedoc.json wires excludeInternal (so @internal
      # cross-transport wiring like SharedSession.refreshGuard is exempt)
      # plus validation.notDocumented + treatValidationWarningsAsErrors, so
      # `npm run docs` itself already fails on regression — this step just
      # runs it in CI without publishing the generated _docs/ output.
      - name: Docs — no undocumented public API exports
        run: npm run docs

      - name: Dependency vulnerability scan (CI-03)
        run: npm audit --audit-level=high --omit=dev

      # SC#1 / D-02: end-to-end proof (not config trust) that the browser
      # persona never pulls in a Node-only transport. esbuild
      # --platform=browser makes a Node built-in (net/tls/dns/etc.) pulled
      # in transitively by @grpc/grpc-js or amqplib a hard build error
      # rather than a silent polyfill (RESEARCH Area 1).
      - name: Bundle-and-grep gate — no Node transports in the browser bundle (SC#1)
        run: npm run bundle-grep

      # T-17-27: the dynamic `import('jose')` guard (17-03) that lets the
      # Node persona lazy-load jose must not throw ERR_REQUIRE_ESM when a
      # CommonJS consumer requires the built entry. This failure surfaces
      # only at first require of the CJS entry — invisible to
      # tsc/vitest/bundle-grep — so it needs its own post-build gate.
      - name: CJS-require smoke — grpc entry (T-17-27)
        run: node -e "require('./dist/grpc/index.js')"

      - name: CJS-require smoke — middleware entry (T-17-27)
        run: node -e "require('./dist/middleware/index.js')"

      # T-17-24: analog of the Rust SDK's `grep -r 'eyJ' target/debug/` leak
      # gate — no JWT-shaped ("eyJ"-prefixed) string may appear anywhere in
      # this SDK's own built output. Sensitive<T> (17-01) keeps token
      # values out of debug/log/serialized surfaces; this proves it holds
      # in the compiled artifact too.
      - name: Token-leak gate — no JWT-shaped strings in built output (T-17-24)
        run: |
          if grep -r 'eyJ' dist/ 2>/dev/null | grep -v '^Binary file' | grep -q .; then
            echo "FAIL: found 'eyJ'-prefixed (JWT-shaped) strings in dist/"
            grep -r 'eyJ' dist/ 2>/dev/null | grep -v '^Binary file' || true
            exit 1
          fi
          echo "OK: no JWT-shaped strings found in dist/"

      # T-17-25 / CONTRACT §6: strict TLS is always on; the only escape
      # hatch is customCa — there must be no insecure/skip-verification
      # surface anywhere in the SDK's own source tree.
      - name: TLS-lint gate — no TLS-bypass patterns (CONTRACT §6, T-17-25)
        run: |
          if grep -rniE 'rejectUnauthorized\s*:\s*false|NODE_TLS_REJECT_UNAUTHORIZED|insecureskipverify' src/ 2>/dev/null | grep -q .; then
            echo "FAIL: found a TLS-bypass pattern under src/"
            grep -rniE 'rejectUnauthorized\s*:\s*false|NODE_TLS_REJECT_UNAUTHORIZED|insecureskipverify' src/ || true
            exit 1
          fi
          echo "OK: no TLS-bypass patterns found under src/"

      # SC#5: proves the tarball is publish-ready (dist/ included; src/gen
      # and node_modules excluded via package.json's `files` allowlist)
      # without side effects. The publish job re-runs this same command
      # before the real `npm publish`.
      - name: Dry-run publish gate (SC#5)
        run: npm publish --dry-run

  # Publishing to npm is IRREVERSIBLE — a version number can never be reclaimed.
  # Git tags are NOT branch-scoped, so without this gate a release tag cut on a
  # feature branch would ship unreviewed code to the world. The publish job
  # below `needs:` this.
  verify-tag-on-main:
    name: Verify tag is on main
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Assert the tagged commit is an ancestor of origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points at ${GITHUB_SHA}, which is NOT on origin/main. Release tags must be cut from main."
            exit 1
          fi
          echo "OK: ${GITHUB_REF_NAME} (${GITHUB_SHA}) is on origin/main."

  publish:
    name: Publish to npm
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    # Manual-on-tag, side-effecting job: only runs when a maintainer pushes a
    # vX.Y.Z tag. It is never triggered by a PR, so NPM_TOKEN is never exposed
    # to PR-triggered jobs (T-17-26).
    permissions:
      contents: read
      id-token: write   # required for npm provenance (OIDC), D-21
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install buf
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff  # v1.4.0
        with:
          setup_only: true

      - name: Install dependencies
        run: npm ci

      # npm rejects a re-published version and a tag can outlive a forgotten
      # version bump, so assert the tag and package.json agree BEFORE any
      # publish side effect rather than discovering the mismatch afterwards.
      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "${tag_version}" != "${pkg_version}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} implies version ${tag_version}, but package.json says ${pkg_version}."
            exit 1
          fi
          echo "OK: tag ${GITHUB_REF_NAME} matches package.json version ${pkg_version}."

      # D-20: regenerate-and-bundle the compiled ts-proto stubs before
      # publishing so npm consumers (who cannot run buf) get a
      # self-contained package.
      - name: Regenerate and bundle proto stubs (D-20)
        run: npm run generate && npm run build

      - name: Verify package before publish (SC#5)
        run: npm publish --dry-run

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
